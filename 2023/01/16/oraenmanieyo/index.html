	</style><!--lit-part--><!--lit-part BRUAAAUVAAA=--><!--lit-part OHDs57sDFVI=--><p>&quot;오랜만이에요~~&quot; or &quot;oraenmanieyo&quot; as Koreans will say if they haven&#39;t seen you for just a week. My favorite lunch lady that I see once a week at one of my schools ALWAYS says this to me. Same with the bakery ladies even though they see me every Thursday too. 근데… 진짜 오랜만이다!!! Seriously, it&#39;s almost been a year since I have written to you. The only thing I don&#39;t like about writing in Hangul, the Korean alphabet, is that you cannot emphasize your text the way we can capitalize everything and make it extra dramatic because you all know I am a walking hyperbole. Anyway, <em>again</em>, it&#39;s been a long time! How are you??? Send me a text, DM, email, or whatever. I would love to know!</p><p>I initially meant to publish this in June 2022, but for all you know, I could be making this up... get ready for a long post of updates!</p><p>Since February, I visited home for almost a month! It was so, SO nice to eat food at home again. One of the top three things I missed while living in Korea had (and still has) been my mom&#39;s food. Everything my mom makes is my favorite dish; something I will never take for granted again. I am the least lucky person out there, but there are two things I feel lucky about; being born in America (automatically a native English speaker) and having a mom who cooks the best food. No one can change my mind because many others agree. </p><p>I successfully surprised all of my family members thanks to the help of my sister who almost ruined the surprise<em> </em>too many times. Before I surprised my immediate family, I told my sister what I thought everyone&#39;s reactions would be and I was exactly spot on about everyone. It was the absolute best to hug my family and friends that I could see. I missed my family and friends a lot, but I was very ready to come back to my home here in Korea (sorry mom and dad, I know your stomachs are churning after reading that sentence). My time at home was jam-packed with scheduled meetings with family and friends I had planned to see. I always say I only have two or five friends, but somehow saw 14 people who were not my family. I even went up to Whistler to snowboard with my sister and our friends. My calendar makes my head hurt every time I see it. Even now, but worth it!</p><p>I completed my second year of teaching and half of my students this year were completely new to me. At this point, I&#39;ve taught about 750 faces. I feel really lucky, I guess here&#39;s the third lucky thing about my life, to have such a great workplace environment, students, and coworkers. My main school&#39;s coteacher changed to my favorite coworker, Park Jieun, who sat next to me in the office last year. She calls herself my Korean Mom and me, her American daughter. She comments on how tired I look every time I show up to work so it&#39;s forced me to sleep AT LEAST 8 hours, which is the best thing I&#39;ve done for myself in a long time. She hasn&#39;t commented on my tiredness since because she knows I&#39;m getting my beauty sleep in. Even my dermatologist couldn&#39;t get me to sleep more (Korea, the skin care capital of the world, seriously ruined my flawless skin (lack of sleep was never the main cause but anyway it&#39;s better now, thanks to Dr. Park Hyunho)). I&#39;m a lot better at remembering names now since I am more familiar with the Korean language. Although, I feel like I need to because my students will occasionally ask me if I remember their names—I feel terrible when I can&#39;t remember. </p><p>I MOVED APARTMENTS! Thank GOD. One of my coteacher&#39;s searched and called every realtor in the city every day for two and a half weeks. It was so exhausting and mentally draining because I knew I could do this by myself if it hadn&#39;t been for the language barrier. I felt like a burden. I almost gave up because everything we saw, we both didn&#39;t like and I wasn&#39;t going to move if I didn&#39;t love it more than ‘The Box’ that I had last year. On the last day we looked, I woke up that morning saying, “if I don&#39;t find something today, I&#39;m just going to stay here.” The first place we looked at that morning was perfect. I signed the lease that day. Now, I live alone in a one-bedroom apartment; a dream, seriously. And the landlord is the best landlord I&#39;ve ever had. All thanks to Jin Duseong.</p><p>I joined the volleyball team at one of my schools—Kyoryong Elementary. 14 Namwon elementary schools competed in a tournament one weekend in May. Meaning I would potentially have to compete against two of the other elementary schools I work at. Luckily I did not need to do that, but when I met my main school&#39;s team, Namwon Elementary, at the tournament, the principal asked, &quot;Thaovi! Why aren&#39;t you playing for our school? Is there anything you can&#39;t do???&quot;.  My team did well, we only lost once to the team that won the tournament. I played very well during the season so I wasn&#39;t worried about my performance for the tournament. However, some of the men on my team are ball hoggers and it was frustrating for me since this is a team sport. Regardless, it was a really fun experience. After the tournament, we had lunch and drank for a full workday…I was so nervous because 한국말 잘 못 해요!!! I can&#39;t speak Korean well!!! It ended up being so fun though. Everyone was super inclusive and maybe because we were all drinking, we weren’t self-conscious about speaking each others&#39; language (Korean drinking culture is like none other let me tell you...).</p><p>Summer came around and I left the country! I went to the Philippines with a couple of friends and it was such a wonderful trip. The Philippines was never a top country on my bucket list but I was itching to leave Korea since it is such a small country and you can only do so much when you don&#39;t own a car. So, Jane, my friend who I travel a lot with got me to come with her (didn&#39;t take much convincing). We went to two different islands and three different destinations. Bohol, where we scuba dived and did every tourist thing that pops up when you look up the island; Palawan, where we went to Puerto Princesa and El Nido. Here, we went on a subterranean underground river tour (a super awesome untouched cave with bats flying up and around close to you with very interesting natural structures inside) and did an island hopping tour of five different islands and lagoons in a rainstorm among other things! My highlights of this trip were that the people were just genuinely kind here, the water was beautiful and so CLEAN, and it is overall such a beautiful country. I would recommend everyone to go at some point in their lives (especially if you love the water). </p><p>Some of my family came to visit shortly after which caused the delay in this post. I really wanted to publish what I had written before their arrival in September but here we are in 2023...oops is all I can say. </p><p>I had the BEST time with my family; my dad, younger brother, sister, and her boyfriend came to visit me. They all came to Namwon on the same day, aka my happiest day of the year. Yes, they all fit in my apartment; impossible if they came to visit last year. My brother, Tri, was here for the weekend; dad was here for a little over a week; my sister, 11 weeks! (Yes, she still has a job). It was really nice to show some of my family my home here in Korea and I think they liked seeing it in real life as well. My dad even said, “next time we can show mom and Hieu!” I got so used to my sister, QuynhAnh, being here that we started to call my apartment, &#39;our apartment.&#39; #crying. I don&#39;t get homesick often, but having them with me for one weekend or eleven weeks made my home feel even homier. I&#39;m still getting over the fact that they&#39;re not here anymore, but I&#39;m so grateful for all the time I was able to spend with them here in Korea. </p><p>While my sister was in Korea, she got to visit two of my schools, Namwon and Kyoryong Elementary, meet my students and sit in on my classes. My kids were so ecstatic to meet someone so close to me that two too many classes took up half of my teaching time asking her questions. She even got to enjoy Korean school lunch, which she came on the best meal of the year in my opinion; steak bites and other yummy food. Two coworkers that I&#39;m very close to, Taehoon and Jihyeon, set aside time to meet and hang out with QuynhAnh. They even prepared gifts for her arrival in Korea. &quot;What about me???&quot; I jokingly asked Taehoon and his response was, &quot;uhhhhhhhh share&quot; and laughed. Even my kids gave my sister candies and stickers calling them gifts. After she went home, some would ask when she’d be back. My phone’s lock screen is of me and my sister and the kids that met her are always excited that they know the girl on their teacher’s phone. My kids and coworkers are the best!</p><p>QuynhAnh and I got to travel internationally together! She and I visited Malaysia, Singapore, and our grandparents and family in Vietnam! This was the first time we traveled with just the two of us and it was really nice to spend so much time abroad together. We agreed that Malaysia was way better than expected and had amazing food, Singapore was most beautiful at night (it looks exactly like it does in the movies), and Vietnam is just the best because of our family and the food. In Korea, we visited Jeonju, Damyang, Busan, Jeju Island, Yeosu, and Seoul together. We watched BTS perform in Busan, rode around in a motorbike car on Udo Island in Jeju, and watched the sunrise in Yeosu together. My favorite weekend with my sister was when we reunited in Busan after she left me for Japan for a week. That was the best weekend of last year honestly.</p><p>I received perfect scores for all but one of my teaching observations. Which was great for me, but honestly, I was hoping for more feedback on how to improve, but that&#39;s okay! I&#39;ll pat myself on the back for this one. Half of the teachers in my office observed me so when I walked into the office after I finished teaching that day, they all started cheering for me. The science teacher, who is usually nervous to speak English, so proudly exclaimed, &quot;verrrrry nice!!!&quot;. It was so cute. Everyone in the office was so supportive of me because they knew how much I dreaded my observation day. </p><p>I renewed my contract for a third year, something I did not expect to do. I&#39;m just not ready to say goodbye to my newfound home, my students, and my coworkers. Many of my third-graders asked for my autograph and wrote me cards saying they hope that we can meet again next year. A few of my sixth graders sobbed having to say goodbye to me as they have to move on to middle school the next year. My sweet and eager learner, Mang Juno, promised me he’d come back to visit me—I can’t wait to see him again. For not being able to communicate fluently in their language, we still find ways to connect. It&#39;s been so special to literally and figuratively see all of my students&#39; growth over the last two years, I can&#39;t wait to see how they grow next year. Life this past year has had its rough patches, different from last year, but something I would never change because it makes me who I am right now. </p><p>This winter vacation, I&#39;m going on two international trips and two domestic ones. I&#39;m spending two weeks in Japan with a couple of friends (meeting up with a family friend and college friend too (so exciting!!)), and then a 5-day solo trip to Taipei for my birthday. In Korea, I&#39;m heading to Jeju Island once again and Gangwon province to see the best beach in the country! I am so excited about these trips and especially to go on a trip outside of Korea alone. I went on my first solo weekend trip back in April and I forgot how much I loved doing things alone and remembered how important it is to spend time with myself. I cannot promise I&#39;ll update you about these trips, but I&#39;ll try. See you soon, xoxo. </p><!--/lit-part--><?><!--/lit-part--><!--/lit-part--></template></prismic-body></astro-island>
