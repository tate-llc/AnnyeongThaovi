			<astro-island uid="pEUBG" component-url="/index.2464379d.js" ssr="" client="idle" before-hydration-url="/chunks/astro_scripts/before-hydration.js.28762372.js" opts="{&quot;name&quot;:&quot;PrismicBody&quot;,&quot;value&quot;:true}" await-children=""><prismic-body><template shadowroot="open"><style>

	</style><!--lit-part--><!--lit-part BRUAAAUVAAA=--><!--lit-part 7EBM5KMVJZw=--><p>Summer is here, but here&#39;s an update about my winter vacation. As I mentioned in my last blog post, I went on four trips—two domestic, two international. As tiring as that sounds to some of you, which yes, it definitely was, it was so fun at the same time. </p><p>My travels to Japan included Osaka, Nara, Kyoto, Nagoya, Hakone, and Tokyo! Osaka is known to be Japan&#39;s food capital but my friends and I only found mediocre food there. We must have been doing it wrong, but overall I&#39;m not sure how much I&#39;d recommend this place. Although, I&#39;ll try again in the future when I make my return to Japan&#39;s Universal Studios. Those on social media who have Japan on your discover page have probably seen videos of bowing deer. Those deer are actually vicious and live in Nara. <br />Kyoto was BEAUTIFUL. I loved everything about it. The architecture, the food, the people, the shops, the places—just walking in Kyoto I always found myself happy. The best restaurant experience I had was in Kyoto where the chef said, &quot;I&#39;ll be waiting every night for your return&quot; as we left so I must return!!! It snowed one of the days we were there so we thought it would be a good idea to wait to go to Fushimi Inari, one of Japan&#39;s most famous shrines, but it was not because all the busses and some trains stopped running because of the snow. But lo and behold, we made it there and it was absolutely breathtaking. <br />Nagoya is named Japan&#39;s most boring city and it lived up to its name. Our trip was 2 weeks long so we needed a day where we did nothing of importance and that we did and we did that there. Originally we planned for Nagoya because the new Studio Ghibli Theme Park is there but we learned it&#39;s complicated to secure tickets so definitely look into that before you plan your trip to Japan to go to Studio Ghibli Theme Park. We booked an onsen stay in Hakone with a mountain view of Mt. Fuji, but just our luck it was extremely foggy and snowy then so we couldn&#39;t see Mt. Fuji from our place at all. However, while riding the Shinkansen, we were able to see Mt. Fuji as we were on the train tracks. <br />Tokyo is Tokyo! Honestly, it was just another big city to me, but it was special because I was able to catch up with a family friend that I haven&#39;t seen since I was 8 years old. It&#39;s truly amazing how much more you discover as an adult about the world and about people. I met my friend after five years from University who is from Japan. She and I, although many years apart, never skipped a beat when we were together. Coincidentally, a high school friend was in Tokyo at the same time and knew I was there and reached out so we got to catch up as well! <br />If you felt any bit sad that I couldn&#39;t go to Studio Ghibli Theme Park, no fret! I went to the Studio Ghibli MUSEUM instead while in Tokyo; 10/10 experience. My favorite place in Tokyo was Asakusa which included a great coffee bar shop, an amazing miso soup breakfast spot, and the freshest melon pan I&#39;ll ever have. By the end of my Japan trip, I was saying arigatogozaimasu and sumimasen like nobody&#39;s business, words I didn&#39;t even know before coming to Japan. Pro tip when traveling to Japan, don&#39;t say arigato; this is only used between friends otherwise it can be considered rude! </p><p>As soon as I got back home to Namwon, I was packing for my next trip. I slept in my bed twice then got on another plane to Jeju Island. Usually, when I visit Jeju Island it&#39;s to visit my friend Sylvia who lives there, but this trip was my first trip spending it with my mainland friends, Lydia, Jane and Mary! Lydia moved back home to the US this year so our last hurrah with our friends was spent on Jeju Island together. It was a wonderful time and Lydia and I got to spend some one on one time together since we were able to get a little more time off than the others! We celebrated our friend Jane&#39;s birthday, made homemade sangria, went hallabong (Jeju is known for hallabong—similar to tangerines) picking, and of course, ate delicious food together! Until we all meet again for another trip together! </p><p>Next trip: Solo Trip! Taiwan was such a lovely time and it&#39;s become such a special place to me because I went there alone. Although, my friend Lydia and her boyfriend Intak were there at the same time as me so I spent one day and part of my birthday with them! Together, we explored Yehliu Geopark, Shifen Old Street and Waterfall, Yinyang Sea, and finally Jiufen Old Street. In Shifen, we wrote on a giant lantern and let it fly into the sky to grant our wishes. Jiufen is known to be Spirited Away town and I learned that Jiufen was an old red light district made during Japanese colonization. </p><p>I planned a rough itinerary of what I&#39;d do in Taipei while I was on the plane to Taiwan...quite the planner I&#39;d say. A lantern festival was taking place while I was there and there was no way to miss it because a big chunk of the city was decorated with lights and lanterns. One night, I meant to go to a night market, but I was mesmerized by the lights outside so I got off the bus to explore the area. There was a cute bunny walking light projection on Taipei 101 tower and I found myself staring at that for 15 minutes. Lydia, Intak, and I went to Din Tai Fung (DTF) for my birthday lunch and they gave me a special DTF present right after I said, &quot;if DTF had merch, I would buy it.&quot; Lydia got me a very cute cake for my birthday that we all got to eat together! Anyone who has kept in touch with me these last three years has learned about my shark obsession and of course, I found a shark pop-up store and took shark photobooth photos! I spent a good chunk of my day exploring the Beitou Hot Springs which is famous in Taipei! Maps told me to take a bus from the subway to get there, but I decided to walk and found a yummy cà phê sữa đá (Vietnamese iced coffee) cafe and cute alleyways on the way there! I went on a hike on a trail called Elephant Mountain to catch the sunset and it was the most peaceful hike I’ve ever done, maybe because I had nobody to talk to on it. Solo travel is nice because you can explore without worrying about others&#39; needs. I hope everyone can experience solo travel at least once because it is so special. Wandering without an itinerary, people-watching, and eating ice cream while journaling all felt extra special to me in Taipei. </p><p>My final winter vacation destination was Gangwon Province, otherwise known as Gangwon-do. I rented a car and spent four days, three nights here with my friend Maya who was soon moving back to the States. Together, we visited Sokcho, Yangyang, and Gangneung and in one day visited eight different beaches. Maya had never been to Sokcho before (her top destination in Gangwon-do), but I went in 2021 so it was interesting to see the differences just after two years! Yangyang has a very famous beach called Surffy Beach, but my favorite beach in Gangwon-do that I&#39;ve visited is Sokcho Beach! And Gangneung is a city beach known for its tofu so we tried their soondubu gelato! I wasn&#39;t sure what tofu gelato would taste like, but it was surprisingly very delicious! Then I remembered there&#39;s a Vietnamese dessert that I like that&#39;s made with soft tofu... Gangwon-do is known for snow crabs and other fresh seafood so, Maya and I were on the hunt for some crabs but somebody tell me why small crabs were one hundred dollars each??? The only crab we tasted that weekend was in a crab pasta which was great, just not the crab we were wanting to have. All in all, it was a great last hurrah with Maya and last vacation before the school year began! <br /></p><p>*if you’d like to see photos of my travels, please look on my Instagram story highlights thank you lol*</p><!--/lit-part--><?><!--/lit-part--><!--/lit-part--></template></prismic-body></astro-island>
