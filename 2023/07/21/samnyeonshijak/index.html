	</style><!--lit-part--><!--lit-part BRUAAAUVAAA=--><!--lit-part X/ShKF2XNyk=--><p>Remember when I said that Maeng Juno, one of my students who graduated elementary school last year, promised he&#39;d come back to visit me in a previous post? Well, the world has come full circle and I am now teaching at his middle school this year! This year, I&#39;m still, sOo0 fortunately, teaching at four different schools, two being schools I&#39;ve taught at since the beginning, Namwon and Kyoryong Elementary, and two new middle schools<strong>—</strong>one private; Yongbuk Middle, and one in the mountains; Ayoung Middle. As always, the first day at a new school is always the most nerve-wracking for me, but everyone was so kind and welcoming and made me feel like I belonged. Coincidentally, the principal&#39;s son at Yongbuk is heading to UW in the fall so that&#39;s very exciting for him! But now I definitely feel special treatment from the principal because his son&#39;s soon-to-be university is my alma mater. He had me talk to his son on the phone and it was the funniest and most, kind of, awkward encounter of all time. The math teacher, Younghu, who sits next to me in the office at Ayoung, and I have become quite close coworkers! His English has improved a lot just by talking to me all the time at work. Ayoung is quite far from the city so my coteacher, Hwaryeong, drives me to and from work every Friday and we always have really nice conversations together! </p><p>Korea finally became maskless at the beginning of the year! On the first day back at Kyoryong, my fifth grader, Hangyul, did not recognize me without my mask and looked at me with the most confused face. So, I covered my nose and mouth to which he exclaimed, &quot;OH THAOVI TEACHER!!!!!!!! 안녕하세요!!!!!!&quot; and gave me the biggest and tightest hug. This year I teach five periods at Kyoryong, 4 periods, lunch, and then fifth period. My fifth-period kids didn&#39;t know I&#39;d be teaching them again so when I saw them lining up for lunch, their cute faces lit up and they were ecstatic to see me again. They were jumping up and down saying hello and that they love me. It was adorable. One of my fourth graders this year, Minsung, genuinely and innocently asked me if I fly to Korea every day from America to get to work. To which I answered, &quot;Yes, I love you that much so I fly here every day to see you&quot; HAHA. </p><p>Every day this year has felt a bit bittersweet since the school year started because I know my time in Korea will end someday. I know marriage is far, far away for me, but I already know which coworkers of mine I&#39;ll invite so I can hopefully see them again in America. The coworkers I&#39;m closest to have told me they&#39;ll save money to visit me! My fourth grader, Minkyung, made me promise her that one day when she comes to The US I need to be there to welcome her. Sol, another fourth grader of mine, told me that there&#39;s no need for me to go back to The US.  I told her my family lives there, then her response was, &quot;But you know...I live <em>here</em>. In Korea.&quot; Thinking about leaving my home away from home has made me tear up several times already, but I know that is because my time in Korea has been quite the experience; one that I will cherish forever.</p><p>A friend told me that there was no way my coworkers wouldn&#39;t throw me a big goodbye party before I head back to the US and they were right. I was talking to an old coworker the other day and she said, &quot;We have to do the party for you to say goodbye and also celebrate you going back home&quot; when we were talking about me leaving one day. All I know is that I&#39;ll be crying the whole time when that happens. </p><p>It&#39;s that time of year again (June - in case I post this in December) when all the Namwon schools get together for the annual Namwon schools volleyball tournament. I learned that when Koreans are studying to become teachers, they&#39;re required to take volleyball as an elective because it&#39;s a sport that they can bond in during school hours. So, volleyball tournaments within schools in cities across Korea are quite common. This year, I chose to play for my main school&#39;s team; Namwon Elementary. A great decision because, unlike last year, the team I played with had great players but terrible teamwork. My team this year trusted each other which resulted in us playing extremely well together. And because of that, it was the best time. I played against some former coworkers who moved to different schools and it was so fun to see each other again and play against them. I thought I would not like playing against schools I work at (meaning people I work/worked with), but it was so much fun!</p><p>After the volleyball tournament, my team and everyone who came to cheer us on—yes, we had fans—went to lunch to eat and, of course, drink. Last year, I drank with my coworkers after the tournament for eight hours. I thought that was a lot, but this year? Eleven hours... one of the lunch ladies came up to me during lunch and told me that she loves me a lot and hopes that I don&#39;t feel lonely while living in Korea by myself. She continued and said that every week when she serves me food she can feel how big my heart is just by making eye contact with me. And boy did I start sobbing. I was already trying my best not to cry that day as I knew it was my last time playing in a tournament with them and that I would be leaving Korea in about nine months and she had the <em>audacity</em> to talk to me that sweetly. The waterworks were uncontrollable. Someone had mentioned that I consistently create these warm interactions with random people in Korea and honestly, I wasn&#39;t truly aware of it until I was told by them and then I more deeply understood that when the lunch lady said those words to me. Earlier that week, the owner of the mart I grocery shop at, Kim Kyung Mi, hugged me over the conveyor belt saying that it&#39;s always, and big emphasis SO nice to see me after not seeing me for so long. I left the mart wanting to cry. Leaving is going to be difficult, to say the least. </p><p>As it is my third year in Korea, I keep denying that my Korean isn&#39;t any good, but I&#39;ve continuously shocked myself with how much better my listening has become. There have been countless times when I haven&#39;t needed to process what was being said to translate in my head, but just immediately understood what was said or asked. It&#39;s funny when my kids ask me questions in Korean and when I respond they take about three seconds to realize I <em>actually</em> understood them. Hangyul, my fifth grader, is convinced that I speak fluently so if I ever throw in a Korean word he yells out, &quot;OH *insert Korean word* is Korean!!!!&quot; and actually says this in Engish. There was a time when my coworkers, Park Jieun and Kim Seunggi, were talking and I started laughing because of something they said and Jieun just went, &quot;NO! Thaovi you&#39;re not supposed to understand Korean right now!&quot; Recently, there was an issue happening at school so when the admin was getting statements from students, I started listening and when I asked Jieun about it later she said, &quot;WOW Thaovi! You understood very well, that&#39;s exactly what is going on.&quot; Putting Korean listening on my resume for my next job *insert sunglass emoji*. Totally kidding. </p><p>A slight shift in topic, but this year I have injured myself twice. I learned that I have a herniated disk and had to lay on the floor for seven straight days because my bed was too soft for my back. Of any week to injure myself, that was the best week to do so because I had a five-day weekend that week. I&#39;m okay now, eastern medicine is truly magical. But I&#39;m trying to continue to do strengthening and conditioning exercises to ease the pain. I hurt my back when I started playing volleyball again this year when I landed on my right foot weirdly and it was game over from then on. The next week when I saw my coworkers from the school I broke my back at (because remember, ya girl works at four different schools), everyone was very sweet and concerned for my health. Every single staff member asked how my back was. It took about a month to recover.</p><p>The subsequent injury was because of soccer. I play soccer with seven of my fifth-grade boys after class every Wednesday; Juwon, Seungjoon, Byeonggwon, Hyunho, Younghwan, Juyoung, and Chan. Sometimes Hangyul, the boy who didn&#39;t recognize me when he saw me without my mask for the first time, joins too. This injury is because I&#39;m just dumb; I played soccer with my slides on that day and stubbed my toe so hard that the top of my big toe nail split from the bed of my toe and immediately started bleeding. (Graphic sorry). But when I tell you I know my kids love me, this is when I truly knew they CARE about me. Seungjoon was next to me when my toe started bleeding and called everyone to stop because &quot;TEACHER. BLOOD. STOP.&quot; <br />My kids, who all are obsessed with playing soccer, dropped everything in an instant just to make sure I was okay. Juyoung told me to stay put because he was going to go get the nurse. Juwon was pulling out his Hello Kitty bandaids for me. Younghwan was so gently holding onto my foot as Seungjoon poured water over my toe to wash away the blood. Chan was spraying disinfectant on my toe. Byeonggwon was getting more water for Seungjoon to pour over my toe. And Hyunho had barged into a staff meeting (I don&#39;t have to go to these because it&#39;s pointless for a non-Korean speaker to go) to tell them I was hurt. I had way too many people seeing my toes that week but it&#39;s all healed now so don&#39;t worry. Talk about WORRY, my goodness. I love them so much. </p><p>To continue my injury streak this year, I joined a volleyball and soccer club in Namwon. Knock on wood that I don&#39;t actually injure myself by joining these clubs. Volleyball is fun because I play with a couple of my coworkers and an old coworker! I&#39;m learning new skills that I would otherwise not learn if I didn&#39;t join. It&#39;s super technical and learning in Korean is a bit difficult, but the coach says I&#39;ve been improving! Volleyball club consists of two high school students to middle age adults and is coed. It&#39;s been 7 or 8 years since I&#39;ve played soccer competitively, but my body went right back into it on the first day. I scored two goals!! The soccer club is a woman&#39;s club in Namwon, but sometimes some of the girls&#39; boyfriends come to play with us. I was so nervous to join because I didn&#39;t know anyone and better yet, I can&#39;t speak Korean fluently. But from day one, everyone was so kind and welcoming towards me and made me feel so included. You might be wondering, then how do we communicate? We just speak to each other in our languages with as much English/Korean as we know and we end up understanding each other because our listening is decent enough. <br />We took a picture together on the first day and they made me be in the middle because I was new. I clicked with all the women immediately and felt genuinely happy for the first time in what seemed like a long time, but was maybe just a month. I&#39;m the youngest of all my friends in Korea, and I became friends with one of the younger girls on the team, Woohee, and she calls me 언니/unnie, which has a similar meaning to &quot;older sister&quot; and it was heartwarming to be called that honestly. Woohee is now extra special to me too because I later found out that her mom is the sweetest woman in Namwon, Kim Kyung Mi—the mart worker, the one that I mentioned in one of the above paragraphs. One of the other girls on the team and I learned we were born the same year, also only 11 days apart! Her face lit up when she found out because all her friends were born a year earlier so I&#39;m the first, and I quote, &quot;real friend&quot; she&#39;s made born the same year as her. Her name is Haein. I&#39;m not sure why, but age and the year you&#39;re born really matters in this country. </p><p>Update (I wrote the above paragraph a week before this one); I spoke an injury into existence. I&#39;ve injured myself once again. Third time&#39;s a charm though, right? I pulled a quad muscle from soccer so I&#39;m out for two weeks. I guess I am no longer young. The physical therapist I saw said REST AND STRETCH. One of my students, Eunsung, finishes practices before my practices start and noticed I wasn&#39;t at practice last week and asked me where I was. I had to tell him I got injured and I just think it&#39;s cute he was looking for me after his practice was over. </p><p>Every week my kids, Taeyeon, Chae-a, Sowon, and Woo-i, bring me a napkin during lunch and that&#39;s such a random act of kindness, but such a consistent act done towards me that I want to remember. A couple of my fifth graders, Seoyeon and Kyumi, come to talk to me while I eat my food, and as distracting as that is, it&#39;s a very consistent and sweet gesture. And since we&#39;re on the topic of lunch, one of the lunch ladies was PACKING rice onto my tray one day and said, &quot;More love more rice&quot; and it was so cute. Every week, I feel as if the lunch ladies are playing the game, &quot;How Much Food Can Thaovi Eat Today?&quot; because even other teachers see my plate and their eyes widen and go &quot;whaaaaat.&quot; I was told that many of the lunch ladies have kids my age so they think of me the same and want to make sure I am well-fed while in Korea; this is the purest form of love I can receive from them and it does not go unnoticed. </p><p>The year is already halfway over and I&#39;ve done a lot of reflection these last several months. I write mostly about my good times because that&#39;s what I want to remember most from my time here, but thinking back on my time I&#39;ve dealt with more hardship than I expected to. However, I want to remember how much I have also grown through these last few years too. It&#39;s kind of crazy how much I&#39;ve changed in two and a half years. Even my coworker, Suhyun, was like, &quot;Thaovi remember when you&#39;d ask me all these questions like xyz when you first moved?&quot; and I had no recollection of it. It&#39;s sort of comforting knowing that my growth has not gone unnoticed, even by my colleagues. Each year, I feel like there&#39;s some major hurdle I have to face and this year in particular is about friendships. I&#39;ve had a realization that my time in Korea in relation to friendships is like a condensed version of my whole life where you start with a lot of friends and slowly, as you get older, those friendship circles decrease. Some people aren&#39;t meant to be in our lives forever and that&#39;s okay! People come and go (literally in this country).  And friendship breakups are more common than not and oftentimes not talked about enough. Reminding myself that I can&#39;t control how someone responds or acts towards me no matter what I do has given me a lot of peace this year. This year, I&#39;m focusing on myself (a continual journey) and building on the relationships that I know I want in my life. I also am focusing on making the most of my last year and living out my last several months in Korea to its fullest without regret! </p><p>This summer, I&#39;m heading to Thailand! Stay tuned...</p><!--/lit-part--><?><!--/lit-part--><!--/lit-part--></template></prismic-body></astro-island>
