		<main>
			<astro-island uid="1LF1cc" component-url="/index.2464379d.js" ssr="" client="idle" before-hydration-url="/chunks/astro_scripts/before-hydration.js.28762372.js" opts="{&quot;name&quot;:&quot;PrismicBody&quot;,&quot;value&quot;:true}" await-children=""><prismic-body><template shadowroot="open"><style>

	</style><!--lit-part--><!--lit-part BRUAAAUVAAA=--><!--lit-part d/v7r5QVRnE=--><p>I booked my one way ticket back to America. The last time I bought a one way ticket was over four years ago and that was a flight to Korea. It felt so surreal to move here and now it feels surreal to be moving back. People have been asking how I feel about moving home and my answer is that I honestly don&#39;t know. I feel a bit of excitement, anxiousness, worry but not exactly <em>worried</em> - there&#39;s a word for this in Korean, 고민 (gomin), but there&#39;s no real translation to capture its full meaning in English. The easiest thing I <em>can</em> say is that I am feeling bittersweet about it all. I am, however, excited to be physically close to my family again. Although I can&#39;t promise my stay in Seattle forever (hahahahahahahahaha just kidding... maybe). </p><p>Since August, I visited Taiwan again to help Jane move and on the second, also the last, day there, we just wish we had more time to explore Taiwan. Taiwan is one of those places I just never expected to really love so much. We then made our way to Cambodia and it was unexpectedly one of the coolest places I had been to in a while. And thanks to our wonderful tour guide, Sareth, and driver, Savon, it was the smoothest trip of our lives. We were able to visit the capital city, Phnom Penh, my friend Sophanna&#39;s hometown, Battambang, and then Siem Reap where Angkor City is. Angkor City is basically the city of temples where the most famous of all their temples, Angkor Wat, is located. Every day in Siem Reap you would just hear me and Jane saying, &quot;WOOOWWWWW.&quot; It was truly amazing. </p><p>Shortly after I got back from my trips, I worked a little bit and then went to Jeju Island to visit Sylvia! Jeju is Jeju and it&#39;s the best as always.</p><p>I then flew to Busan to meet up with my uncle&#39;s family who came to visit. We had a great time surfing and exploring some of the tourist sites together. I was really happy to see my two little cousins, Mila and Calen, enjoying their time in a different country. Since leaving America, I&#39;ve realized a lot of my family has grown up. Despite our age difference of over ten years, it was still so fun to hang out with them. </p><p>Summer vacation finally came to an end but my visitors did not. One of my closest friends from college, Griffen, came to visit me shortly after and I had the best time showing him around Namwon and Busan! It was summer, so Busan and/or Jeju Island are a must to visit. Family of course, but friends coming to Korea to visit me is so special that I cannot explain into words how much it means to me. It was the best best best ever. </p><p>At the beginning of September, my Namwon friends, Lauren and Miso, and I went to Yeosu together. Lauren and I set up a surprise birthday party for Miso and commemorated our first trip together, <em>finally</em>. Setting up a surprise party in a trio friend group was rather hard but we got the job done. This was a much needed trip together and I had so much fun driving my friends around this beautiful peninsula city. We ordered the cutest cake for Miso&#39;s birthday but we couldn&#39;t pick it up during the store&#39;s opening hours, but have no fear! We live in Korea so anything is possible. The store manager gave me the code to enter her store to pick up the cake and trusted that I, a customer she has never met, to make sure that I lock the door after leaving. Could you imagine this happening in America? I don&#39;t think so either. </p><p>Chuseok, Korean Thanksgiving, was in the middle of September so I went to Japan for the third time! This was my second solo Japan trip. I went to Fukuoka this time for 5 days, which if you ever decide to go, I recommend 3 or 4 days only. It was really small but this was the weekend I started to realize I needed to slow down. My stamina for travel was crashing because I had been non-stop go go go-ing every weekend for the past 5 months. I was so tired but I still needed to appreciate the beauty and food Japan has to offer. My favorite place I visited in Fukuoka was a small beach area called Itoshima. It had this beautiful white torii gate in the water with two giant rocks behind it and if you go there at the right time of year, you can see the sun setting between the rocks. Although I didn&#39;t get to see <em>that</em> specifically, I still got to witness a sunset that was really beautiful. There, I met the cutest couple from Hong Kong who came with their parents to celebrate their father’s birthday. They took many photos for me and asked to take pictures together too. They told me they noticed me from a distance because my outfit that day (a black tank top with a long white flowy skirt) matched the scenery of Itoshima. Fukuoka has a ramen they&#39;re known for; Hakata Ramen. I didn&#39;t like it because the broth was so rich in flavor and I prefer lighter broths so if you&#39;re interested, I would recommend! Otherwise, pass. But if you find yourself in Hakata, Fukuoka, I would say you should try. </p><p>After coming home from Fukuoka I wanted to rest but I found out Olivia Rodrigo was coming to Seoul so I had to return that weekend to see her because if you know me, you know I love her. It was the best and a concert I didn&#39;t realize I needed to see in my life. I think it fully healed my heart. Music is so powerful. </p><p>At the beginning of October, my sister, Bear and I had planned a really exciting trip to Japan which would have been my fourth trip there but unfortunately there was an unexpected turn of events and we had to cancel our entire trip — woh woh. But all is well now and everyone is safe and healthy! I was devastated since something really exciting was going to take place on that trip.</p><p>At the end of October, my friend Boris from university came to visit again. He brought his brother and a friend this time so it was nice to meet them too! I showed them around Jeonju and met up with them in Seoul that weekend then said goodbye again. Through Boris, I made a new friend, Vivian. Although I don&#39;t feel like I really want any new friends, it&#39;s been nice getting to know someone new since I feel extremely comfortable with everyone I&#39;m already friends with in Korea now. </p><p>The fall foliage in Korea is some of the most beautiful foliages’ I&#39;ve seen in life. So many vibrant colors of tree leaves changing from green to red, orange and yellow. And eventually you see all the leaves drop to the ground. Every year, the leaves change color and drop to reset. This year especially was a reminder to me that even nature needs to listen to its environment, reset and recharge. If we don&#39;t listen to how our environment is, how can we survive? This year has been my most peaceful year yet, but I&#39;m still learning how to listen to my body, rest and recharge when my energy is low. As you can see from my travels, it is a work in progress. </p><p>At the end of November and January, two of my soccer friends got married! My friends, Suhye (well, unnie, if we want to be formal with Korean culture (this is basically what you’d call any girl older than you (if you’re also a girl)) and Daeun! It was nice to know both brides and grooms in each weddings since they’re both my friends/teammates since I’m used to only knowing one or the other when I have gone to past weddings. It felt really beautiful to see both my unnie and friend marry people they love.</p><p>You must be wondering what exciting event was supposed to happen on the Japan trip, right? Well, you guessed it! My sister and Bear are now engaged!!! I was so devastated because I knew that event was going to happen in Japan, not to mention, at Fujisan, for a long time and then suddenly we had to change the plan and I couldn’t be there for their big day anymore so I was really sad. So sad, my coworkers were concerned about me the day after I learned I had to cancel my trip. This trip was not just any trip, but a trip I was really looking forward to for so many reasons and so many months. I was especially excited to see my sister again, and witness the love of her life propose to her! But it all crumbled in a second for me. Sigh. I must be so dramatic… we knew this though. But it’s not about me!!! Well this event particularly is not, but this blog obviously is though (hahaha). Anyways they are engaged now and happy and I’m so happy too and to gain a future brother in law soon!</p><p>Lastly, I stepped outside of Asian waters and traveled to the Middle East! My friend Kalei and I reunited with Jane, who moved to Taiwan that I mentioned earlier in this post, in Dubai! We traveled to the United Arab Emarites and Qatar. </p><p>Honestly, I had no expectations going into this trip since I didn’t have much prior knowledge of either countries, only that Dubai would be expensive. To our surprise, Dubai had, I’d say, American prices without tipping. We visited Abu Dhabi too! There, we visited the Grand Mosque which is the first mosque any of us have ever visited and it was so beautiful. I’m not quite sure how to explain my trip besides the fact that the culture, history, architecture and religion in both countries felt so rich and beautiful. The people were truly kind there and the food was not bad! Although, I think I might like middle eastern/Mediterranean food in America better? It was really amazing to learn and experience a new area of the world that I didn’t think I’d ever visit. </p><p>I just read a random statistic that said as of 2025, Dubai and Doha are the first and second most boring cities in the world, and I’m here to say that I don’t think that’s true, AT ALL. I could also think of more boring places in the world too. For one, Nagoya, Japan. Terribly boring. Remember when I said Cambodia was unexpectedly the coolest place I’d been to in a while? I think the Middle East takes the cake. I would recommend all to visit some day!!! </p><p>It’s now mid February and has been snowing more than usual. My last day of work felt like walking into a snow storm blizzard. Last week, I completed my work as an English teacher in Korea (cry), said my goodbyes to students and coworkers at all four schools I have been working at this past year (cry again) and am currently on my vacation time now and will be on ~vacation~ (with Lydia and Jamie, my last two friend visitors (yay!)) until my contract ends at the end of this month. Lydia used to live in Korea so we’re mostly just hanging out, catching up, and doing what we do best—eating, in Seoul. Have I mentioned Lydia is my favorite friend to eat with ever??? Just something about a friend that is down to eat everything with you that you want to try is so nice. Jamie, my close friend from university, will arrive later this weekend which I am SO ecstatic about. I’m going to show her around my Korea hometown, Namwon; Jeju Island to climb Hallasan, pick tangerines; and of course Seoul to shop, eat, and do some fun activities we have planned like getting our color analysis’!</p><p>Anyway, see you again in my final blog next month??? I can’t believe the end is near. 🥹</p><!--/lit-part--><?><!--/lit-part--><!--/lit-part--></template></prismic-body></astro-island>
