			<astro-island uid="2dCupM" component-url="/index.2464379d.js" ssr="" client="idle" before-hydration-url="/chunks/astro_scripts/before-hydration.js.28762372.js" opts="{&quot;name&quot;:&quot;PrismicBody&quot;,&quot;value&quot;:true}" await-children=""><prismic-body><template shadowroot="open"><style>

	</style><!--lit-part--><!--lit-part BRUAAAUVAAA=--><!--lit-part LxcoMydv2JU=--><p>Hiiiiiii, blog fam~ sorry I have been MIA. Life and work have been SO busy!!! I just finished my first (very successful) semester of teaching! Besides, getting adjusted to life here in Korea took a lot longer than I expected it to. After not having a bed for two months, my apartment is all finally coming together. Thanks, money!</p><p>Time is passing by so quickly. I have done much traveling since my last post, I’ve figured out my groove for teaching students who don’t understand me and even became a weekly regular at the famous bakery in Namwon called 명문 제과 (Myeongmun); so regular that the owner doesn’t even ask me what I want to get anymore.</p><p>I keep thinking that my Korean gets worse by the day, but I pick up more words that my students say to me every day. I had a conversation with the bakery owner today for almost five minutes and she could understand me! So, I guess you could say I’m an expert now.</p><p>Some of my favorite things about work are:</p><ol><li>When I speak or write in Korean to my students, they all freak out in the best way but stop paying attention because they’re distracted by my ~spectacular, little to none~ Korean knowledge.</li><li>Every Monday and Tuesday morning at my main school, Namwon Elementary, I get greeted by four of my coworkers while I’m changing into my school slippers (in Korea, you wear “outside” shoes and “inside” shoes)—one of the four NEVER fails to say, “morning teaaaa!” to me while another coworker makes me this hot cereal because they know I don’t eat breakfast sometimes.</li><li>Hugs from my kids (if you know me well, you KNOW I love a good hug).</li><li>Every Wednesday and Thursday morning, I take the same bus as the janitor and a special needs teacher to my second school, Kyoryong Elementary. They always include me in their conversations even though they know I have no idea what they’re saying, but it makes me feel included and it’s really nice.</li><li>One of my four co-teachers (I have four (for four schools, basically like a supervisor for each school), but I teach with 19 different people). She is the best and makes me feel so comfortable around her. She has told me that I make speaking English easier because she feels comfortable around ME, and that is THE best compliment I have received from a native Korean. Which not to brag, two other Korean teachers have told me the same – I guess I just have that effect on people *hair flip*.<br />Honestly, though, everything about work I absolutely love, and I am <em><strong>so</strong></em> lucky to be able to say this.</li></ol><p>My favorite end of the semester story is of my last day of teaching one of my fourth-grade classes at Kyoryong Elementary. I was telling the kids that it was my last day seeing them before summer vacation and they all yelled out, “nooo” or in Korean, “아니!!!!” (aniiiii) or “안돼!!!!!” (andwaaaaae). One kid actually had his mask off since he was sipping on his water and he made the biggest frowny face I had ever seen and it was so precious at the same time.</p><p>Then once class was over, I said, “Have a good summer, everyone; be good to 민국 선생님” (their homeroom teacher). And my favorite kid (yes, unfortunately, I have favorites—it’s inevitable) got up from his seat, with a half-sad face, slowly walked up to me with his arms spread out, and gave me the biggest and tightest hug I had been given in a while, and wouldn’t let me go.</p><p>Not long after, the rest of the class came toward me and we were in a big class group hug that lasted over two minutes long. It was THE sweetest thing ever. It melted my heart and I was internally crying (happily of course) for the rest of the day because of that moment. When I say, I have THE BEST students, I really mean it. I thought I wanted to get out of Namwon when I first got here, but these kids are really good at convincing me to stay.</p><h2>Travel</h2><p>As for traveling, I have been to Seoul, <a href="https://www.youtube.com/watch?v=7YJ3YT_0ihY" rel="noopener noreferrer">Busan</a>, Daegu, <a href="https://www.tiktok.com/@alwayshungrylydia/video/6963983521786367237?_d=secCgYIASAHKAESMgow3M0WD%2B5wFAK1DFQ2lpID4KMKAKAJM22j6jk0eCiWeC5E4W9Pwk2hXzvOyIZCM1kVGgA%3D&amp;language=en&amp;mid=6777274113254754306&amp;preview_pb=0&amp;region=KR&amp;sec_user_id=MS4wLjABAAAAaxR5IxNKADE_QmoHkktgdp51G_fzuPuL8xZkA_ccf81DiQQ_VansyvK4NqJI7pMn&amp;share_app_id=1233&amp;share_item_id=6963983521786367237&amp;share_link_id=AD8A7E5E-4071-407D-A393-D09BFBBC2AF5&amp;source=h5_t&amp;timestamp=1621428774&amp;tt_from=copy&amp;u_code=daj3g6727eiakd&amp;user_id=6789875926915826694&amp;utm_campaign=client_share&amp;utm_medium=ios&amp;utm_source=copy&amp;_r=1" rel="noopener noreferrer">Jeonju</a>,<a href="https://www.tiktok.com/@alwayshungrylydia/video/6955046013879045381?_d=secCgYIASAHKAESMgowLTofIkYXPGoqBy%2Bqk8L9sz8rrhYkma%2FmOPVH15bzDIQKfb2RyCvAF7IJ9Ljcx4uaGgA%3D&amp;language=en&amp;mid=6722656094272883458&amp;preview_pb=0&amp;region=US&amp;sec_user_id=MS4wLjABAAAAVSzdZ3mBfaZqoXPxZPvXPtveJ7zWRJO81XU8id6f3ZmQgq0VK_nHjkDWNZwXPCdW&amp;share_app_id=1233&amp;share_item_id=6955046013879045381&amp;share_link_id=CD8768C9-2A4B-440E-A950-E97AC838CA31&amp;source=h5_t&amp;timestamp=1619353660&amp;tt_from=copy&amp;u_code=dg9cf13i3fgb9g&amp;user_id=6912206210545927173&amp;utm_campaign=client_share&amp;utm_medium=ios&amp;utm_source=copy&amp;_r=1" rel="noopener noreferrer">Gwangju</a>, Suncheon, Gokseong, <a href="https://www.youtube.com/watch?v=8yJ-krle0HE" rel="noopener noreferrer">Boseong, Damyang</a>, and Gochang (I’ve linked vlogs to some locations that my friend, Lydia, has made, so be sure to watch those and follow/subscribe to her channel because she’s super awesome, cute, basically another version of me and we are always together). This summer, I will be heading back to Busan to surf (I’ll be careful mom &amp; dad, don’t worry!!) and then to Jeju Island and Yeosu! Korea is so breathtaking. Nature here is so different from home, and coming from Washington, we are all so lucky, but Korea is truly a beauty. I am always in awe wherever I go, even in Namwon.</p><h2>Busan</h2><p>My absolute favorite place that I have traveled to so far is <strong>Busan</strong>. Before I came to Korea, I wanted to move there, but obviously, I don’t live there. I think if I would have gotten placed there, I would never go back home to America… Busan is the perfect mix of a big city, peaceful sceneries, ocean and mountains views, and the nicest and most beautiful people I have encountered in Korea. One of my coworkers and I are pretty good friends now and before I left for Busan, he said that he knows I’ll love it a lot, and he was not wrong— this place exceeded all expectations; from food to views and everything in between.</p><!--/lit-part--><?><!--/lit-part--><!--lit-part VxB3lsJRI9M=-->

					<!--/lit-part--><!--lit-part BRUAAAUVAAA=--><!--lit-part vOLc1DZjOCg=--><h2>Suncheon</h2><p>Suncheon is another good-sized city with a national garden and a famous movie set to try on clothes and take pictures. Something I have yet to do. They also have this really yummy brewery there with this awesome salad dish. Something about Korea that I personally do not like is their lack of vegetables. Maybe I haven’t found the right dishes, but GREEN vegetables in dishes are pretty much nonexistent, and growing up in a home where I was always well-fed in every food group, my body has definitely been vegetable deprived (so now I have to buy vegetables…crazy!!!).</p><!--/lit-part--><?><!--/lit-part--><!--lit-part VxB3lsJRI9M=-->

					<!--/lit-part--><!--lit-part BRUAAAUVAAA=--><!--lit-part 94+l18N4Bc8=--><h2>Gokseong</h2><p>Gokseong is this tiny train town. The first KTX train is located in this town. Everything about this town has trains written all over it. It’s so cute but there’s not much else to do here. But the train village is actually pretty big! It definitely gave me Disneyland vibes (it’s a lot smaller than Disneyland but still fun)! At the peak of Spring, all the flowers in this train town bloom so beautifully so it is a must-go in the springtime. Gokseong has this cafe called, ’01 DORA’ with THE BEST little blueberry puff pastry thing I’ve ever had. It looks beautiful on the outside and is even tastier when you bite into all of its crunchy layers!!! My friend Sabrina and I went there two weekends in a row just to get that pastry.</p><h3>Story Time!!</h3><p>The weather forecast said it would rain the second time Sabrina and I went to Gokseong. All I had was my half-almost-broken umbrella so I brought that with me, but Sabrina brought me another umbrella to keep. I was holding two umbrellas throughout the day and all day long, I was trying to figure out where to get rid of my broken umbrella because I didn’t want to take it home with me; especially since now, I got a new umbrella from Sabrina. Then it started POURING rain for ten minutes so I was able to use the umbrella that Sabrina gave me and then I saw these super unprepared ladies who seemed to be running for their lives to get out of this rain. So of course in my head, I’m like, “this is perfect! I can get rid of it by giving it to them!” So, I ran over to these strangers, yelled, “저기요!!!” (jogiyoooo) then handed them my spare umbrella. They took it, said thank you a bunch, and then happily ran away under an umbrella to more cover. The End.</p><!--/lit-part--><?><!--/lit-part--><!--lit-part VxB3lsJRI9M=-->
