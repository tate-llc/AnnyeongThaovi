				</header>

				<main>
					<div class="excerpt"><!--lit-part OHDs57sDFVI=--><p>&quot;오랜만이에요~~&quot; or &quot;oraenmanieyo&quot; as Koreans will say if they haven&#39;t seen you for just a week. My favorite lunch lady that I see once a week at one of my schools ALWAYS says this to me. Same with the bakery ladies even though they see me every Thursday too. 근데… 진짜 오랜만이다!!! Seriously, it&#39;s almost been a year since I have written to you. The only thing I don&#39;t like about writing in Hangul, the Korean alphabet, is that you cannot emphasize your text the way we can capitalize everything and make it extra dramatic because you all know I am a walking hyperbole. Anyway, <em>again</em>, it&#39;s been a long time! How are you??? Send me a text, DM, email, or whatever. I would love to know!</p><p>I initially meant to publish this in June 2022, but for all you know, I could be making this up... get ready for a long post of updates!</p><p>Since February, I visited home for almost a month! It was so, SO nice to eat food at home again. One of the top three things I missed while living in Korea had (and still has) been my mom&#39;s food. Everything my mom makes is my favorite dish; something I will never take for granted again. I am the least lucky person out there, but there are two things I feel lucky about; being born in America (automatically a native English speaker) and having a mom who cooks the best food. No one can change my mind because many others agree. </p><p>I successfully surprised all of my family members thanks to the help of my sister who almost ruined the surprise<em> </em>too many times. Before I surprised my immediate family, I told my sister what I thought everyone&#39;s reactions would be and I was exactly spot on about everyone. It was the absolute best to hug my family and friends that I could see. I missed my family and friends a lot, but I was very ready to come back to my home here in Korea (sorry mom and dad, I know your stomachs are churning after reading that sentence). My time at home was jam-packed with scheduled meetings with family and friends I had planned to see. I always say I only have two or five friends, but somehow saw 14 people who were not my family. I even went up to Whistler to snowboard with my sister and our friends. My calendar makes my head hurt every time I see it. Even now, but worth it!</p><p>I completed my second year of teaching and half of my students this year were completely new to me. At this point, I&#39;ve taught about 750 faces. I feel really lucky, I guess here&#39;s the third lucky thing about my life, to have such a great workplace environment, students, and coworkers. My main school&#39;s coteacher changed to my favorite coworker, Park Jieun, who sat next to me in the office last year. She calls herself my Korean Mom and me, her American daughter. She comments on how tired I look every time I show up to work so it&#39;s forced me to sleep AT LEAST 8 hours, which is the best thing I&#39;ve done for myself in a long time. She hasn&#39;t commented on my tiredness since because she knows I&#39;m getting my beauty sleep in. Even my dermatologist couldn&#39;t get me to sleep more (Korea, the skin care capital of the world, seriously ruined my flawless skin (lack of sleep was never the main cause but anyway it&#39;s better now, thanks to Dr. Park Hyunho)). I&#39;m a lot better at remembering names now since I am more familiar with the Korean language. Although, I feel like I need to because my students will occasionally ask me if I remember their names—I feel terrible when I can&#39;t remember. </p><p>I MOVED APARTMENTS! Thank GOD. One of my coteacher&#39;s searched and called every realtor in the city every day for two and a half weeks. It was so exhausting and mentally draining because I knew I could do this by myself if it hadn&#39;t been for the language barrier. I felt like a burden. I almost gave up because everything we saw, we both didn&#39;t like and I wasn&#39;t going to move if I didn&#39;t love it more than ‘The Box’ that I had last year. On the last day we looked, I woke up that morning saying, “if I don&#39;t find something today, I&#39;m just going to stay here.” The first place we looked at that morning was perfect. I signed the lease that day. Now, I live alone in a one-bedroom apartment; a dream, seriously. And the landlord is the best landlord I&#39;ve ever had. All thanks to Jin Duseong.</p><p>I joined the volleyball team at one of my schools—Kyoryong Elementary. 14 Namwon elementary schools competed in a tournament one weekend in May. Meaning I would potentially have to compete against two of the other elementary schools I work at. Luckily I did not need to do that, but when I met my main school&#39;s team, Namwon Elementary, at the tournament, the principal asked, &quot;Thaovi! Why aren&#39;t you playing for our school? Is there anything you can&#39;t do???&quot;.  My team did well, we only lost once to the team that won the tournament. I played very well during the season so I wasn&#39;t worried about my performance for the tournament. However, some of the men on my team are ball hoggers and it was frustrating for me since this is a team sport. Regardless, it was a really fun experience. After the tournament, we had lunch and drank for a full workday…I was so nervous because 한국말 잘 못 해요!!! I can&#39;t speak Korean well!!! It ended up being so fun though. Everyone was super inclusive and maybe because we were all drinking, we weren’t self-conscious about speaking each others&#39; language (Korean drinking culture is like none other let me tell you...).</p><p>Summer came around and I left the country! I went to the Philippines with a couple of friends and it was such a wonderful trip. The Philippines was never a top country on my bucket list but I was itching to leave Korea since it is such a small country and you can only do so much when you don&#39;t own a car. So, Jane, my friend who I travel a lot with got me to come with her (didn&#39;t take much convincing). We went to two different islands and three different destinations. Bohol, where we scuba dived and did every tourist thing that pops up when you look up the island; Palawan, where we went to Puerto Princesa and El Nido. Here, we went on a subterranean underground river tour (a super awesome untouched cave with bats flying up and around close to you with very interesting natural structures inside) and did an island hopping tour of five different islands and lagoons in a rainstorm among other things! My highlights of this trip were that the people were just genuinely kind here, the water was beautiful and so CLEAN, and it is overall such a beautiful country. I would recommend everyone to go at some point in their lives (especially if you love the water). </p><p>Some of my family came to visit shortly after which caused the delay in this post. I really wanted to publish what I had written before their arrival in September but here we are in 2023...oops is all I can say. </p><p>I had the BEST time with my family; my dad, younger brother, sister, and her boyfriend came to visit me. They all came to Namwon on the same day, aka my happiest day of the year. Yes, they all fit in my apartment; impossible if they came to visit last year. My brother, Tri, was here for the weekend; dad was here for a little over a week; my sister, 11 weeks! (Yes, she still has a job). It was really nice to show some of my family my home here in Korea and I think they liked seeing it in real life as well. My dad even said, “next time we can show mom and Hieu!” I got so used to my sister, QuynhAnh, being here that we started to call my apartment, &#39;our apartment.&#39; #crying. I don&#39;t get homesick often, but having them with me for one weekend or eleven weeks made my home feel even homier. I&#39;m still getting over the fact that they&#39;re not here anymore, but I&#39;m so grateful for all the time I was able to spend with them here in Korea. </p><p>While my sister was in Korea, she got to visit two of my schools, Namwon and Kyoryong Elementary, meet my students and sit in on my classes. My kids were so ecstatic to meet someone so close to me that two too many classes took up half of my teaching time asking her questions. She even got to enjoy Korean school lunch, which she came on the best meal of the year in my opinion; steak bites and other yummy food. Two coworkers that I&#39;m very close to, Taehoon and Jihyeon, set aside time to meet and hang out with QuynhAnh. They even prepared gifts for her arrival in Korea. &quot;What about me???&quot; I jokingly asked Taehoon and his response was, &quot;uhhhhhhhh share&quot; and laughed. Even my kids gave my sister candies and stickers calling them gifts. After she went home, some would ask when she’d be back. My phone’s lock screen is of me and my sister and the kids that met her are always excited that they know the girl on their teacher’s phone. My kids and coworkers are the best!</p><p>QuynhAnh and I got to travel internationally together! She and I visited Malaysia, Singapore, and our grandparents and family in Vietnam! This was the first time we traveled with just the two of us and it was really nice to spend so much time abroad together. We agreed that Malaysia was way better than expected and had amazing food, Singapore was most beautiful at night (it looks exactly like it does in the movies), and Vietnam is just the best because of our family and the food. In Korea, we visited Jeonju, Damyang, Busan, Jeju Island, Yeosu, and Seoul together. We watched BTS perform in Busan, rode around in a motorbike car on Udo Island in Jeju, and watched the sunrise in Yeosu together. My favorite weekend with my sister was when we reunited in Busan after she left me for Japan for a week. That was the best weekend of last year honestly.</p><p>I received perfect scores for all but one of my teaching observations. Which was great for me, but honestly, I was hoping for more feedback on how to improve, but that&#39;s okay! I&#39;ll pat myself on the back for this one. Half of the teachers in my office observed me so when I walked into the office after I finished teaching that day, they all started cheering for me. The science teacher, who is usually nervous to speak English, so proudly exclaimed, &quot;verrrrry nice!!!&quot;. It was so cute. Everyone in the office was so supportive of me because they knew how much I dreaded my observation day. </p><p>I renewed my contract for a third year, something I did not expect to do. I&#39;m just not ready to say goodbye to my newfound home, my students, and my coworkers. Many of my third-graders asked for my autograph and wrote me cards saying they hope that we can meet again next year. A few of my sixth graders sobbed having to say goodbye to me as they have to move on to middle school the next year. My sweet and eager learner, Mang Juno, promised me he’d come back to visit me—I can’t wait to see him again. For not being able to communicate fluently in their language, we still find ways to connect. It&#39;s been so special to literally and figuratively see all of my students&#39; growth over the last two years, I can&#39;t wait to see how they grow next year. Life this past year has had its rough patches, different from last year, but something I would never change because it makes me who I am right now. </p><p>This winter vacation, I&#39;m going on two international trips and two domestic ones. I&#39;m spending two weeks in Japan with a couple of friends (meeting up with a family friend and college friend too (so exciting!!)), and then a 5-day solo trip to Taipei for my birthday. In Korea, I&#39;m heading to Jeju Island once again and Gangwon province to see the best beach in the country! I am so excited about these trips and especially to go on a trip outside of Korea alone. I went on my first solo weekend trip back in April and I forgot how much I loved doing things alone and remembered how important it is to spend time with myself. I cannot promise I&#39;ll update you about these trips, but I&#39;ll try. See you soon, xoxo. </p><!--/lit-part--></div>
				</main>

				<header class="header">
					<h1 class="title">
						<a class="title-link" href="/2022/02/03/the-end-part-i"><!--lit-node 4-->
							<!--lit-part-->The End. Part I.<!--/lit-part-->
						</a>
					</h1>

					<time class="date" datetime="2022-02-03"><!--lit-node 6-->
						<!--lit-part-->February 3, 2022<!--/lit-part-->
					</time>
				</header>

				<main>
					<div class="excerpt"><!--lit-part vmlyOhDZM6o=--><p>As my first year of teaching has come to a close, I have to say that my absolute favorite thing I accomplished this year was that I can walk the halls of any of the four schools I work at and pass students and be able to say, “안녕/hi (name)!” to many of my students. I call this an accomplishment because 1. I have close to 500 students and 2. BOY is it <strong>hard</strong> to learn Korean names; they sound soooo similar. I have identical twins whose names are Jin-oon and Jin-oo… and another set named Minseo and Minjae… WHY DO THEY DO THIS TO ME?! I know each set of twins apart though so you can call me a pro. Some of you might not be surprised because of the countless Starbucks customers’ names and orders I could recall, but this is completely different, in my opinion.</p><p>I have always been big on getting to know people more than just how their “good” day is going. (Although if Koreans are good, they tell you, and if not, they tell you). I believe that getting to know someone starts with their name; the biggest identifier of themselves. And not just their name, but saying it right. Seeing my students’ faces, hearing their voices, and being able to identify them in the halls and not just in the classroom has assured me that I have been doing my best to know my students and not just be here to teach them what I know, but to learn who they are as well.</p><p>One of the things I don’t love doing is using Korean in class because they’re in English class and English class = English time! But sometimes to motivate my learners who have a harder time than others, I will tell them “you can do it” in English and Korean. I think this actually helps them want to participate because they can see that I am trying for them as well.</p><p>I am truly amazed by all of my students. The amount that they have learned and retained versus what I have retained in Korean is a much more significant amount. It’s funny because I am so in awe of how most of my coworkers can speak both Korean and English, but here I am, a bilingual individual myself. There is something about living in a country where English is not the primary language and seeing that others know it fluently is so much more amazing.</p><p>I have built strong relationships with my co-teachers and several coworkers that I am so grateful for. The Koreans will never see this, but I’ll write it so I can remember them forever but I want to especially thank all my co-teachers, Hayoung, Jin, Rihwa (a new coteacher!), Jihyeon and Eun Suk for always answering my never-ending questions and dealing with me, a first-year teacher.</p><p>My coworkers, @Kyoryong Elem: Gahyeon, Hyojun, Taehoon, Baek, Minguk, Minsoo, Yoonkyung, Eunhyee, and Jin Jeongsook (the janitor!!); @Namwon Elem: Jieun, Doyoung, Jiwoo, Jiho, Suhyun, Won Songjae, Donghyun, and Jongsik; @Geumji Middle: Mr. Seo, Eun Ha, and Mijung. And the lunch ladies at Namwon Elem and the one that moved to Yongseong Elem.</p><p>There are SO many people to thank but these are the people who have always been so warm and welcoming to me, supported me, genuinely cared for me, driven me home, made sure I would eat all my meals when I got terribly sick, brought me medicine, and some have even been part of my everyday life here in Korea.</p><p>I also would like to thank my fourth-grade classes on Tuesdays, especially my first class of the day because they saved me one morning from literally breaking down in tears. Tuesdays are my busiest days of the week, but the day I look forward to the most because of them, my angels. Seeing their faces light up is the absolute best and having 96% of the class actually participate brings me a lot of joy.</p><p>4-4 class: Serin, Chaewon, Hyuna, Jiyeon, Seokyeong, Gaeun, Yoonhwan, Yumi, Aram, Jiwon, Changhui, Seungyeon, Eunchan, Yeha, Junhyuk, Woohyuk, Hyunjun, Minjun, Jihong, Insung, Yoonhee… I love you all soooooooo much. And yes, I just imagined my kids sitting in the classroom and wrote their names down…what favorites???????? (but this is more so I don’t forget their names ever).</p><p>This year has been the biggest growth I’ve had in my life and this is no exaggeration. Moving across the world, during a pandemic all alone, has helped me learn new ways of life, learn more about myself, the world, and know that I can adapt to any changes that are thrown at me. I also want to ESPECIALLY thank my Bus Besties, Jane and Lydia; my Namwon family, Sabrina, Yusuf, Toni, Chanel, and Marcos; my Islanders, Sylvia, Cheyenne, and Dongun for literally making this past year the greatest year I have ever had. And of course my neighbor, Daniel, for being a very good and helpful neighbor. Without them, my experience would have been extremely different and I am forever grateful for them.</p><p>I have decided to stay in Korea for another year to teach because I can’t leave something I love so much just yet. Saying a possible goodbye to my coworkers and all of my kids made me realize that I truly love my job and I am fulfilled every single day; even after the most exhausting days, they always make it worth it for me.</p><p>Did I cry, you ask? Absolutely.</p><!--/lit-part--></div>

				<header class="header">
					<h1 class="title">

							<!--lit-part-->I’m Alive<!--/lit-part-->
						</a>
					</h1>

					<time class="date" datetime="2021-10-21"><!--lit-node 6-->
						<!--lit-part-->October 21, 2021<!--/lit-part-->
					</time>
				</header>

				<main>
					<div class="excerpt"><!--lit-part w5oOpAGiRpw=--><p>“By submitting this form, you agree to receive <em>occasional </em>emails and/or text messages.” ‘Occasional’ was definitely the right word choice for the agreement statement when you subscribed to my blog. Nine months have passed since I landed in Korea and this is my fourth blog post. How silly of me~ anyways, I’d just like to let everyone know that I am indeed alive and well! If you want to know more than what is below, then you can call, text, dm, facetime, or email me, and I will pick up and/or answer at some point. Technology is truly amazing and has helped me stay in touch with so many and I am grateful for that.</p><p>Since July, I have gone on a few summer trips (<a href="https://www.youtube.com/watch?v=4K1msDNI0tg" rel="noopener noreferrer">Busan</a>, Jeju Island, and <a href="https://www.youtube.com/watch?v=BM9x7koNh80" rel="noopener noreferrer">Yeosu</a>)! And just because summer ended doesn’t mean the trips have ended… I continued my travels on the weekends and went to <a href="https://www.tiktok.com/@alwayshungrylydia/video/7009814804449856774?referer_video_id=6955046013879045381&amp;refer=embed&amp;is_copy_url=1&amp;is_from_webapp=v1" rel="noopener noreferrer">Geoje Island</a>, Sokcho (a pain to get to, but oh, the things we do to go to National Parks (Seoraksan)), <a href="https://www.tiktok.com/@alwayshungrylydia/video/7017767831437577478?referer_video_id=6955046013879045381&amp;refer=embed&amp;is_copy_url=1&amp;is_from_webapp=v1" rel="noopener noreferrer">Gapyeong</a>, Nami Island, and made my first trip back to Seoul since April. For how small Korea is (about half the size of WA), it has a lot of things to do, places to visit, and a heckuva lot of cable cars. I even checked off the box on shooting hand sanitizer straight into my right eyeball; strongly do not recommend.</p><!--/lit-part--></div>

				<header class="header">
					<h1 class="title">
						<a class="title-link" href="/2021/07/21/halfway-there"><!--lit-node 4-->
							<!--lit-part-->Halfway There!<!--/lit-part-->
						</a>
					</h1>

					<time class="date" datetime="2021-07-21"><!--lit-node 6-->
						<!--lit-part-->July 21, 2021<!--/lit-part-->
					</time>
				</header>

				<main>
					<div class="excerpt"><!--lit-part LxcoMydv2JU=--><p>Hiiiiiii, blog fam~ sorry I have been MIA. Life and work have been SO busy!!! I just finished my first (very successful) semester of teaching! Besides, getting adjusted to life here in Korea took a lot longer than I expected it to. After not having a bed for two months, my apartment is all finally coming together. Thanks, money!</p><p>Time is passing by so quickly. I have done much traveling since my last post, I’ve figured out my groove for teaching students who don’t understand me and even became a weekly regular at the famous bakery in Namwon called 명문 제과 (Myeongmun); so regular that the owner doesn’t even ask me what I want to get anymore.</p><p>I keep thinking that my Korean gets worse by the day, but I pick up more words that my students say to me every day. I had a conversation with the bakery owner today for almost five minutes and she could understand me! So, I guess you could say I’m an expert now.</p><p>Some of my favorite things about work are:</p><ol><li>When I speak or write in Korean to my students, they all freak out in the best way but stop paying attention because they’re distracted by my ~spectacular, little to none~ Korean knowledge.</li><li>Every Monday and Tuesday morning at my main school, Namwon Elementary, I get greeted by four of my coworkers while I’m changing into my school slippers (in Korea, you wear “outside” shoes and “inside” shoes)—one of the four NEVER fails to say, “morning teaaaa!” to me while another coworker makes me this hot cereal because they know I don’t eat breakfast sometimes.</li><li>Hugs from my kids (if you know me well, you KNOW I love a good hug).</li><li>Every Wednesday and Thursday morning, I take the same bus as the janitor and a special needs teacher to my second school, Kyoryong Elementary. They always include me in their conversations even though they know I have no idea what they’re saying, but it makes me feel included and it’s really nice.</li><li>One of my four co-teachers (I have four (for four schools, basically like a supervisor for each school), but I teach with 19 different people). She is the best and makes me feel so comfortable around her. She has told me that I make speaking English easier because she feels comfortable around ME, and that is THE best compliment I have received from a native Korean. Which not to brag, two other Korean teachers have told me the same – I guess I just have that effect on people *hair flip*.<br />Honestly, though, everything about work I absolutely love, and I am <em><strong>so</strong></em> lucky to be able to say this.</li></ol><p>My favorite end of the semester story is of my last day of teaching one of my fourth-grade classes at Kyoryong Elementary. I was telling the kids that it was my last day seeing them before summer vacation and they all yelled out, “nooo” or in Korean, “아니!!!!” (aniiiii) or “안돼!!!!!” (andwaaaaae). One kid actually had his mask off since he was sipping on his water and he made the biggest frowny face I had ever seen and it was so precious at the same time.</p><p>Then once class was over, I said, “Have a good summer, everyone; be good to 민국 선생님” (their homeroom teacher). And my favorite kid (yes, unfortunately, I have favorites—it’s inevitable) got up from his seat, with a half-sad face, slowly walked up to me with his arms spread out, and gave me the biggest and tightest hug I had been given in a while, and wouldn’t let me go.</p><p>Not long after, the rest of the class came toward me and we were in a big class group hug that lasted over two minutes long. It was THE sweetest thing ever. It melted my heart and I was internally crying (happily of course) for the rest of the day because of that moment. When I say, I have THE BEST students, I really mean it. I thought I wanted to get out of Namwon when I first got here, but these kids are really good at convincing me to stay.</p><h2>Travel</h2><p>As for traveling, I have been to Seoul, <a href="https://www.youtube.com/watch?v=7YJ3YT_0ihY" rel="noopener noreferrer">Busan</a>, Daegu, <a href="https://www.tiktok.com/@alwayshungrylydia/video/6963983521786367237?_d=secCgYIASAHKAESMgow3M0WD%2B5wFAK1DFQ2lpID4KMKAKAJM22j6jk0eCiWeC5E4W9Pwk2hXzvOyIZCM1kVGgA%3D&amp;language=en&amp;mid=6777274113254754306&amp;preview_pb=0&amp;region=KR&amp;sec_user_id=MS4wLjABAAAAaxR5IxNKADE_QmoHkktgdp51G_fzuPuL8xZkA_ccf81DiQQ_VansyvK4NqJI7pMn&amp;share_app_id=1233&amp;share_item_id=6963983521786367237&amp;share_link_id=AD8A7E5E-4071-407D-A393-D09BFBBC2AF5&amp;source=h5_t&amp;timestamp=1621428774&amp;tt_from=copy&amp;u_code=daj3g6727eiakd&amp;user_id=6789875926915826694&amp;utm_campaign=client_share&amp;utm_medium=ios&amp;utm_source=copy&amp;_r=1" rel="noopener noreferrer">Jeonju</a>,<a href="https://www.tiktok.com/@alwayshungrylydia/video/6955046013879045381?_d=secCgYIASAHKAESMgowLTofIkYXPGoqBy%2Bqk8L9sz8rrhYkma%2FmOPVH15bzDIQKfb2RyCvAF7IJ9Ljcx4uaGgA%3D&amp;language=en&amp;mid=6722656094272883458&amp;preview_pb=0&amp;region=US&amp;sec_user_id=MS4wLjABAAAAVSzdZ3mBfaZqoXPxZPvXPtveJ7zWRJO81XU8id6f3ZmQgq0VK_nHjkDWNZwXPCdW&amp;share_app_id=1233&amp;share_item_id=6955046013879045381&amp;share_link_id=CD8768C9-2A4B-440E-A950-E97AC838CA31&amp;source=h5_t&amp;timestamp=1619353660&amp;tt_from=copy&amp;u_code=dg9cf13i3fgb9g&amp;user_id=6912206210545927173&amp;utm_campaign=client_share&amp;utm_medium=ios&amp;utm_source=copy&amp;_r=1" rel="noopener noreferrer">Gwangju</a>, Suncheon, Gokseong, <a href="https://www.youtube.com/watch?v=8yJ-krle0HE" rel="noopener noreferrer">Boseong, Damyang</a>, and Gochang (I’ve linked vlogs to some locations that my friend, Lydia, has made, so be sure to watch those and follow/subscribe to her channel because she’s super awesome, cute, basically another version of me and we are always together). This summer, I will be heading back to Busan to surf (I’ll be careful mom &amp; dad, don’t worry!!) and then to Jeju Island and Yeosu! Korea is so breathtaking. Nature here is so different from home, and coming from Washington, we are all so lucky, but Korea is truly a beauty. I am always in awe wherever I go, even in Namwon.</p><h2>Busan</h2><p>My absolute favorite place that I have traveled to so far is <strong>Busan</strong>. Before I came to Korea, I wanted to move there, but obviously, I don’t live there. I think if I would have gotten placed there, I would never go back home to America… Busan is the perfect mix of a big city, peaceful sceneries, ocean and mountains views, and the nicest and most beautiful people I have encountered in Korea. One of my coworkers and I are pretty good friends now and before I left for Busan, he said that he knows I’ll love it a lot, and he was not wrong— this place exceeded all expectations; from food to views and everything in between.</p><!--/lit-part--></div>
				</main>

				<header class="header">
					<h1 class="title">
						<a class="title-link" href="/2021/04/29/expecting-the-unexpected"><!--lit-node 4-->
							<!--lit-part-->Expecting the Unexpected<!--/lit-part-->
						</a>
					</h1>

					<time class="date" datetime="2021-04-29"><!--lit-node 6-->
						<!--lit-part-->April 29, 2021<!--/lit-part-->
					</time>
				</header>

				<main>
					<div class="excerpt"><!--lit-part gvxX3bIPPL8=--><p>Never did I think moving to a different country would be easy. I was already expecting it to be tough — being across the world from home, moving alone during a pandemic, not knowing where I&#39;ll be living until I get to Korea… There were so many factors I thought about before moving. Yet, it still was the most traumatizing move of my life (is this an exaggeration? Maybe, but I don&#39;t think so). I was originally told, &quot;you&#39;ve been placed in a province, so your housing will most likely be bigger than the average city life apartment&quot; OOOF were they wrong about that. I had read horror stories about moving across the world through this program, but nothing like mine lol.</p><p>My apartment is a box. It has zero storage space, no closets, my kitchen seems to be hanging by a thread, everything (and I mean EVERYTHING) was covered in five different types of flower wallpaper. Not to mention, I JUST got my bed last week — something that was supposed to be here before I arrived. I&#39;ve been here for over two months.</p><p>The day before EPIK orientation ended, we all learned where exactly in the province we&#39;d be placed/living in. I got placed in a small city called Namwon (남원) just 25–60 minutes away (depending on the mode of transportation) from Jeonju (전주), the capital city of Jeonbuk (전북). Namwon is so small that there is not even a Starbucks or a McDonald&#39;s, which is unfortunate because sometimes I just crave McNuggets or McDonald&#39;s&#39; fries. And I didn&#39;t think I&#39;d miss SBX after it being part of my life for 3+ years, but now that it&#39;s nonexistent, I do… There isn&#39;t much to do here, but there is a lot to appreciate — from its mountainous views to the river and cherry blossoms (when in season) that line the city! My favorite thing about Namwon so far is the Yocheon River because it&#39;s right behind my apartment and I can go on walks by it anytime I want and I am always in awe of how beautiful it is here.</p><p>Most weekends since I&#39;ve been here have been raining so going anywhere really isn&#39;t worth it. So, so far, I&#39;ve only been to Seoul, Jeonju, and Gwangju. This weekend I&#39;m heading to a city called Daegu. And after about two months living in Namwon, I&#39;ve learned to just expect the unexpected — every day and week, some curveball has hit me whether that&#39;s life, the office of education playing games with me or school (Korean surprises we call them), but I&#39;m pushing through and figuring it out slowly but surely and honestly, I have never been more proud of myself than in these last two months! So I&#39;m very happy about that. Plus, I&#39;m SLOWLY learning Korean, making me trilingual (if I ever become fluent lolol — I don&#39;t have that much hope for this, though, but we shall see).</p><!--/lit-part--></div>
				</main>

				<header class="header">
					<h1 class="title">
						<a class="title-link" href="/2021/02/19/i-moved"><!--lit-node 4-->
							<!--lit-part-->I Moved!<!--/lit-part-->
						</a>
					</h1>

					<time class="date" datetime="2021-02-19"><!--lit-node 6-->
						<!--lit-part-->February 19, 2021<!--/lit-part-->
					</time>
				</header>

				<main>
					<div class="excerpt"><!--lit-part Y3LHVQ4JasA=--><p>Surprise! I moved to South Korea and I could not be more excited to start my career here as an English teacher. Since we’re still living in a pandemic, I’ve been in quarantine for the past 2 weeks so I haven’t seen any of Korea; only movies, tv shows, and the view outside my dorm room.</p><p>Many of you are wondering how I got here so I’ll save you the novel and tell you the short story: I applied to a program called EPIK in August, got accepted, and then booked my one way plane ticket to Incheon International Airport. Packed my life away and now I am currently sitting here in the Hae Oreum Dorm at Konkuk University in Chungju writing this post on my last night of quarantine before I start orientation tomorrow and teaching in March.</p><h3>Some notable things since I arrived in Korea:</h3><ol><li>I got covid symptom flagged at the airport for having “too high” of a temperature (37.5°C – the threshold to get held back). They even stickered my passport and made me wear a covid symptom badge necklace to make sure the airport officials knew. Lucky me, I know. This also made my travel from Seattle to my quarantine site go from 14-15 hours max to 27 hours (I slept 3 hours the entire 27 hours and continued to stay away for an additional day since I arrived at my quarantine site at 5:30 am…we love to see it).</li><li>I turned 23 in quarantine! And it wasn’t as lonely as you’d expect. My best friend from college, Jamie, threw me an online birthday party and created a party room where whenever someone would enter the call a new little character she created would join the ‘house party.’ It was so cute and thoughtful! Plus the food I got on my birthday was stellar. Even though I wasn’t at home, my younger brother decided to make Korean fried chicken for my birthday…how sweet and I had to just watch them eat it over a video call #torture.</li><li>Anyone who knows me well knows I cannot tolerate anything above 0 stars but since I can’t pick what I eat during quarantine, I can confidently say that I tolerate spicy food a <strong>little </strong>bit better now – thanks 고추장 (gochujang (Korean red chili paste/sauce))!</li><li>I have survived without a fridge and microwave (the outside ledge of my window acts as a fridge and the heater on blast as a microwave).</li><li>I learned what the difference between sushi and kimbap is.</li><li>The Chungju quarantine staff are the sole reason for my happiness during quarantine. They are so generous and have kept all 100+ of us safe and well-fed over the last 14 days. I truly am so thankful and have so much gratitude for them and all their cute/yummy food surprises. I love them and they have my heart. Chungju over Seoul (quarantine) forever!!!!!</li><li>Two years ago, I watched seasons 1-7 of Game of Thrones in 18 days, which I finished just before season 8 premiered, and I wasn’t sure how much TV I could watch again after that, but anything is possible. So, I watched 7-8 shows/movies in 14 days. And yes, I am ashamed I didn’t finish any K-dramas.</li><li>I used a wet room for the first time, and it’s not as bad as you think it would be.</li><li>I completed a 28 lecture Korean course for beginners, but I still suck at it so I better figure it out soon!</li><li>I made 5 friends at the airport!!!</li></ol><p>Anyways, stay tuned for more updates :).</p><p><em>xoxo from KR ♡</em></p><h4>If you’re interested in the shows/films I watched:</h4><ul><li><strong>I May Destroy You</strong> (12 episodes) – Michaela Coel – 10/10 must watch but don’t binge</li><li><strong>BlacKkKlansman</strong> – Spike Lee – 9/10</li><li><strong>Mulholland Drive </strong>– David Lynch – 7/10 until you watch this <a href="https://www.youtube.com/watch?fbclid=IwAR3ckUSKlm-BGtuwWySnk4FPoaeCtEhVqPT7dAuW8wE5Ols4eufsgj5EkmM&amp;v=VvgRLTP3U5Y&amp;feature=youtu.be" target="_blank" rel="noopener noreferrer">YouTube video explanation</a> AFTER watching the film, then it’s a 9/10 for me LOL.</li><li><strong>The Royal Tenenbaums </strong>– Wes Anderson – 7/10</li><li><strong>Lovestruck in the City</strong> (only watched 5 episodes) – I didn’t finish obvi, but 5/10, I’ve heard both that it gets better and that it doesn’t so I’m not so sure if I will continue.</li><li><strong>Bridgerton</strong> (8 episodes) – 10/10 yep</li><li><strong>Twin Peaks</strong> season 1 (8 episodes) – David Lynch – 10/10</li><li><strong>Twin Peaks</strong> season 2 (22 episodes) – up until episode 12 or 14((?) you’ll know when you watch) 9/10, the rest is a 5/10</li></ul><!--/lit-part--></div>
