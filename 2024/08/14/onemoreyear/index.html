			<astro-island uid="Z1Hvzuq" component-url="/index.2464379d.js" ssr="" client="idle" before-hydration-url="/chunks/astro_scripts/before-hydration.js.28762372.js" opts="{&quot;name&quot;:&quot;PrismicBody&quot;,&quot;value&quot;:true}" await-children=""><prismic-body><template shadowroot="open"><style>

	</style><!--lit-part--><!--lit-part BRUAAAUVAAA=--><!--lit-part C45fWKALPYY=--><p>&quot;One more year&quot; should be trademarked by me. &quot;Really? I won&#39;t believe it until I see it&quot; or &quot;this is the last year right?&quot; are the most popular responses I&#39;ll get when I say I&#39;m staying in Korea for an additional year. </p><p>To be completely honest, this wasn&#39;t something I was expecting myself but here I am sitting at my desk writing this post as I start work here in Korea for my fourth and (probably) final year. I just was not any bit ready to come home. Last year I kept telling myself that it would be my last to force myself to move home to America, but was that what <em>I </em> really wanted? Towards the end of 2023, I realized I wasn&#39;t quite ready to leave my home yet. I know I&#39;ll leave eventually but 2024 wasn&#39;t the year to do that just yet. </p><p>As my fourth year starts, I can&#39;t help but reflect back on my time the last three years and thinking about how much has changed since I moved to Korea. I especially noticed how different my life is now when I visited home this past winter. I feel most excited about this year and what&#39;s in store for me. I feel like I finally created a community for myself in my Korea hometown and I have an amazing support system within those communities, my workplace, and from friends here as well. I truly feel valued and appreciated at work, my soccer team sees me as more than &quot;just the foreigner on the team,&quot; and I feel like the friends I choose to spend my time with now are the ones that have always truly cared for me and vice versa. </p><p>Since my last blog post, I went to Thailand... twice. I traveled to Bangkok and Krabi and then Bangkok again and Chiang Mai for my second trip. The first trip was a tropical vacation and finally getting to experience Thailand waters, snorkeling, swimming, eating fruit on the beach or by the ocean, what more could I ask for?! The second trip, I went to northern Thailand and experienced yummy food and culture! Unfortunately, I did not do the elephants which is a must in Chiang Mai, but I&#39;m sure I&#39;ll be back because I really did love Chiang Mai a lot! </p><p>I went to Jeju Island again too. Jeju is always the most refreshing and recharging break ever for me. I can do many things by myself and see the water almost anywhere I go when I&#39;m there so it&#39;s really nice. </p><p>Shortly after coming home from my first Thailand trip, my entire immediate family came to visit me!! It was the most special experience because they all got to see where I have been living for the past three years and it was our first family vacation since 2012 and our first international trip together outside of Vietnam. Every day with them was absolutely perfect and I think that was the happiest I ever was the entirety of 2023. Together, we visited Namwon of course, Jeonju, Seoul and Busan! We had the best time eating, seeing Korea, and of course, spending time with each other -- a rarity these days to have a full house together. I got to take my family to my favorite spots and restaurants and it was nice seeing them enjoy the things I love here. After the week was over, my family minus my sister went to Vietnam to visit the grandparents. I&#39;m glad I wasn&#39;t left alone right away after the most perfect week of my life. My sister stayed with me for a few more weeks and we went to Busan and Seoul again and Yeosu. After she left me, I went to Thailand again. </p><p>I had a couple of friends and a cousin that visited Korea last year too and it was really nice seeing them as well. There is something about meeting up with someone you were once close to or still close to in a different country that is really so special. I hope there will be more visitors in the future because I love seeing people from home in my current home! </p><p>In about a week, I&#39;ll be leaving for Hokkaido on my second international solo trip! I&#39;m very excited because it&#39;s supposedly cherry blossom season when I go. One of my dreams in life is to see the cherry blossoms in Japan so hopefully it lives up to my own expectations of it. I&#39;m excited to spend some time in a different country alone again and maybe I&#39;ll make some friends, if not, I&#39;m very content spending all the time with myself! </p><p>First semester of my fourth year is almost over and all of my students have been really amazing this year. Usually, I&#39;ll run into a problem with at least one class that will be too talkative or completely silent but this year everyone has been really amazing and evenly split so all 22 classes I teach have a good amount of participation and eagerness to learn. Thank you to the teachers who spent lots of time trying to divide these students into their current classrooms now. The best!! </p><p>---</p><p>It&#39;s currently the beginning of June and the last time I wrote the last paragraph was the end of April... anyway, my trip to Hokkaido was the best trip of my life. I honestly don&#39;t know if I just loved it so much because I was alone and had the best time eating everything or if I was just at peace with life that I was so happy and content to be spending time alone and seeing another part of the world again. I set a 7:30am alarm to wake up everyday to go go go but I never opened my eyes until 9am every day. That is the beauty of solo travel I think. You have no one waiting on you and you aren&#39;t waiting for anyone either. I think every bite of food I had in Hokkaido was the most amazing food I&#39;ve ever had in my life and it would just keep getting better. I didn&#39;t MAKE any friends, but I met a lot of awesome travelers and Japanese people while I was eating there. I even enjoyed a flight of Sapporo beer from the Sapporo Beer Museum and I have to say that was one of the things I was most excited for. THE DAIRY?? If you know me well, you know I&#39;m lactose intolerant but the dairy didn&#39;t hurt me in Hokkaido!!! I seriously had the best trip ever. </p><p>Summer vacation is coming in a couple months and I could not be more excited. Each year, work gets more tiring and I don&#39;t understand how teachers teach forever. I love my kids with all my heart but I&#39;m only in my mid twenties and I&#39;m so tired. My job is seriously the best that I will ever get though. I truly am valued and cared for in Namwon I will be very sad to go when the time comes so I&#39;ll always look fondly of my time here in Korea, especially Namwon.</p><p>---</p><p>It&#39;s July now. Each year, I get better and better at publishing on my blog. I&#39;m finishing up teaching my last first semester in Korea!! I can confidently say this, this time, because I have been having this feeling that I am ready to return and be close to my family and friends in the states again. I think living and being alone will do that to you after some time. Although, I rarely ever feel lonely. I&#39;ve been reflecting a lot the past few months on my time here in Korea. It&#39;s been an experience to say the least. I&#39;ve grown as an adult here, I&#39;ve seen how much more I&#39;m capable of than I thought possible, I learned that I can&#39;t be tied down to one place because I can make any place my home if I allow it to too. </p><p>Living abroad isn&#39;t always rainbows and butterflies though I will be honest. It has its ups and downs just like any ordinary life. But this is my regular and reality right now so of course I occasionally go through all the emotions that life throws at me. Entering my mid 20s and navigating my 20s in a completely different environment from where I grew up required me to be strong and independent. As half of 2024 has come to a close, I thought back to what I was like when I first moved to now and I feel especially more grown, more mature, I have some sense of direction in life and feel a lot more calm and at peace with the unknown. I&#39;m just even more sure about who I am as a person than ever before. I truly was a baby adult when I moved so I can understand now what emotions my parents may have felt when I told them I was going to move to another country as a 22 year old. I&#39;m so lucky and blessed to always be supported in my decision to come here and grow as an adult by my friends and family. I&#39;ve been feeling really proud of myself the last few months when I think of how I&#39;ve evolved as a person in these last three and a half years. I&#39;m definitely not the same person as when I left but I would say I&#39;ve become a better one and that is what I&#39;m feeling proud of lately. </p><p>My last couple of updates before I go missing from this blog for six months to a year is from the annual Namwon Schools tournament with all the teachers and staff and the norovirus school lunch food poisoning cases that is currently happening right now. </p><p>For volleyball, each team has 9 players and I was 6 in the lineup, my lucky number. In the tournament there were four different brackets and my team&#39;s bracket only had 3 teams so we played a total of two games because we won one and lost the other. The team we lost to took 2nd place in the tournament and I felt we could have beat them had they not had a 6&#39;4&quot; volleyball COACH on their team... oh well. It was a bummer but relief at the same time since we could finish early and eat lunch at a reasonable hour. All the other teams that kept playing couldn&#39;t eat lunch until around 2pm!! The final teams didn&#39;t eat until 4:30! I would cry if I couldn&#39;t eat a proper meal from 9am until then... anyway, at lunch one of my coworkers had just found out it was my last year teaching in Korea and he started sobbing. I&#39;m not even exaggerating or joking too. I was touched at the same time though because my closest coworker there said this just shows how much we love and will miss you when you go, Thaovi. I started crying too because 1. I cry very easily and 2. Someone was sharing their true and honest feelings with me and it made me emotional too. I&#39;m always surprised how loved I am by my coworkers here. I truly have it better than any other foreign English teacher I know in Korea and I just feel especially lucky to have met some of the most amazing people in Korea while working in Namwon. </p><p>Namwon is currently experiencing a school lunch food poisoning epidemic. The first case started on Tuesday this week. By Thursday, we heard that there were 160 suspected cases of food poisoned patients, later that afternoon the number went up to 210. Then this Friday morning the number shot up to about 500+ patients. 22 elementary, middle and high schools in Namwon have now been affected and those schools have currently either shut down, shortened school hours to until lunch time, and/or postponed tests since it&#39;s test season. Nobody is safe!!!! Be safe out there and wash your hands with soap. </p><p><em>Update: it&#39;s Monday the next week and the number is now 1024 patients and 24 schools throughout the city and we made it on BBC News...</em></p><p>And before I really go away, my next trip is Taiwan for a couple days to help Jane move (cry) and then we&#39;ll be heading to Cambodia for a week for our last big trip together (until winter vacation hahaha). We booked a full tour for our entire trip for ease, safety and because of the fact that we both hate planning. There&#39;s a lot on the schedule but I&#39;ve been in contact with our tour guide and he seems laid back as well which will be good for us. We&#39;ll be traveling to Phnom Penh, Battambang and Siem Reap. We&#39;re not excited for the heat but we are so excited to explore a new country together again! I also booked a last minute flight to Jeju to visit my friend, Sylvia, and then my uncle&#39;s family will be coming to Korea so I&#39;ll fly to Busan after my Jeju trip to meet up with them!!! FULLY BOOKED SUMMER!! </p><!--/lit-part--><?><!--/lit-part-->
